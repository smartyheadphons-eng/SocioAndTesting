<!DOCTYPE html>
<html lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Doors Quiz</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --gold: #f4d38a;
            --cream: #fffaf0;
            --brown: #5a3b2e;
            --dark-brown: #2e1a12;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            color: white;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;

            /* Sociology / family themed background */
            background:
                linear-gradient(rgba(20, 10, 5, 0.7), rgba(10, 5, 2, 0.9)),
                url("https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
        }

        /* Soft overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top, rgba(244, 211, 138, 0.15), transparent 45%),
                radial-gradient(circle at bottom, rgba(255, 255, 255, 0.06), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 30px 20px 60px;
        }

        h1 {
            margin-top: 10px;
            font-size: clamp(2rem, 4vw, 3.5rem);
            color: var(--cream);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        }

        .subtitle {
            opacity: 0.9;
            margin-top: -10px;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .scoreboard {
            display: inline-flex;
            gap: 20px;
            padding: 12px 24px;
            margin-bottom: 30px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            font-weight: 600;
        }

        /* ================= DOORS ================= */

        .doors {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            perspective: 1400px;
            margin-top: 25px;
        }

        .door-frame {
            width: 170px;
            height: 280px;
            padding: 8px;
            border-radius: 18px;
            background:
                linear-gradient(145deg, #d9b67a, #8f6538);
            box-shadow:
                inset 0 0 0 3px rgba(255, 248, 220, 0.25),
                0 18px 40px rgba(0, 0, 0, 0.5);
        }

        .door-scene {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1400px;
        }

        /* Warm family silhouette inside the house */
        .door-glow {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background:
                radial-gradient(circle at center,
                    rgba(255, 230, 160, 0.95),
                    rgba(255, 190, 80, 0.65),
                    rgba(255, 170, 40, 0.2),
                    transparent 75%);
            filter: blur(4px);
        }

        .family-icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            z-index: 1;
            opacity: 0.85;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.35);
        }

        .door {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            cursor: pointer;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition:
                transform 1.1s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s ease,
                filter 0.3s ease;
            z-index: 2;

            background:
                linear-gradient(135deg,
                    #7d5132 0%,
                    #9f6d44 18%,
                    #6d4328 45%,
                    #4b2d1a 100%);
            box-shadow:
                inset 6px 0 10px rgba(255, 255, 255, 0.08),
                inset -10px 0 20px rgba(0, 0, 0, 0.35),
                0 12px 25px rgba(0, 0, 0, 0.45);
        }

        /* Door panels */
        .door::before {
            content: "";
            position: absolute;
            inset: 16px;
            border-radius: 8px;
            border: 2px solid rgba(255, 235, 190, 0.15);
            box-shadow:
                inset 0 0 0 2px rgba(0, 0, 0, 0.15),
                inset 0 0 25px rgba(255, 255, 255, 0.03);
        }

        /* Door handle */
        .door::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: radial-gradient(circle at 30% 30%, #fff5c4, #c49b3d);
            box-shadow:
                0 0 8px rgba(255, 215, 120, 0.6),
                0 0 2px rgba(0, 0, 0, 0.4);
        }

        .door:hover {
            transform: rotateY(-12deg) scale(1.02);
            box-shadow:
                inset 6px 0 10px rgba(255, 255, 255, 0.08),
                inset -10px 0 20px rgba(0, 0, 0, 0.35),
                0 0 30px rgba(255, 220, 140, 0.35);
        }

        .door.open {
            transform: rotateY(-125deg);
            box-shadow:
                -35px 10px 50px rgba(0, 0, 0, 0.65);
        }

        .door.disabled {
            pointer-events: none;
            filter: grayscale(0.3);
        }

        /* ================= QUESTION BOX ================= */

        .question-box {
            display: none;
            max-width: 760px;
            margin: 50px auto 0;
            padding: 30px;
            border-radius: 24px;
            background: rgba(20, 12, 8, 0.72);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);
        }

        .question-box h2 {
            margin-top: 0;
            line-height: 1.8;
            color: var(--cream);
        }

        .answers {
            display: grid;
            gap: 14px;
            margin-top: 25px;
        }

        .answer-card {
            padding: 16px 20px;
            border-radius: 16px;
            cursor: pointer;
            text-align: right;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }

        .answer-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(244, 211, 138, 0.6);
            box-shadow: 0 10px 25px rgba(244, 211, 138, 0.15);
        }

        .answer-card.correct {
            border-color: var(--success);
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.45);
        }

        .answer-card.wrong {
            border-color: var(--danger);
            animation: shake 0.35s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            50% {
                transform: translateX(6px);
            }

            75% {
                transform: translateX(-4px);
            }
        }

        .result {
            margin-top: 18px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .next-btn {
            margin-top: 22px;
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: #2e1a12;
            font-weight: 700;
            display: none;

            background: linear-gradient(135deg, #ffe7a3, #f4c96d);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            transition: 0.25s ease;
        }

        .next-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 12px 30px rgba(244, 211, 138, 0.35);
        }

        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
        }

        .door-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .door-topic {
            min-height: 32px;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(8px);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--cream);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        @media (max-width: 768px) {
            .doors {
                gap: 30px;
            }

            .door-frame {
                width: 130px;
                height: 220px;
            }

            .family-icon {
                font-size: 3rem;
            }

            .question-box {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

        let score = 0;
        let streak = 0;
        let correctAnswers = 0;

        // =========================
        // ASSIGN TOPICS TO DOORS
        // =========================
        function assignTopicsToDoors() {
            const topicElements = document.querySelectorAll(".door-topic");
            const doorElements = document.querySelectorAll(".door");

            let availableQuestions = [...questions];
            availableQuestions.sort(() => Math.random() - 0.5);

            currentDoorQuestions = availableQuestions.slice(0, 3);

            topicElements.forEach((topicEl, index) => {
                const q = currentDoorQuestions[index];

                if (q) {
                    topicEl.textContent = q.topic;
                    topicEl.style.visibility = "visible";
                    topicEl.style.opacity = "1";
                    doorElements[index].style.visibility = "visible";
                } else {
                    topicEl.textContent = "";
                    topicEl.style.visibility = "hidden";
                    topicEl.style.opacity = "0";
                    doorElements[index].style.visibility = "hidden";
                }
            });
        }

        // =========================
        // OPEN DOOR
        // =========================
        function openDoor(door) {
            if (locked || questions.length === 0) return;

            const doorIndex = [...document.querySelectorAll(".door")].indexOf(door);
            const selectedQuestion = currentDoorQuestions[doorIndex];

            if (!selectedQuestion) return;

            currentIndex = questions.indexOf(selectedQuestion);
            locked = true;

            document.querySelectorAll(".door").forEach(d => {
                d.classList.add("disabled");
            });

            door.classList.add("open");

            setTimeout(showQuestion, 900);
        }

        // =========================
        // SHOW QUESTION
        // =========================
        function showQuestion() {
            const q = questions[currentIndex];
            if (!q) return;

            const questionBox = document.getElementById("questionBox");
            const answersDiv = document.getElementById("answers");

            questionBox.style.display = "block";
            document.getElementById("question").innerText = q.question;
            document.getElementById("result").innerText = "";
            document.getElementById("nextBtn").style.display = "none";

            answersDiv.innerHTML = "";

            q.answers.forEach((answer, index) => {
                const card = document.createElement("div");
                card.className = "answer-card";
                card.innerText = answer;
                card.onclick = () => checkAnswer(index);
                answersDiv.appendChild(card);
            });
        }

        // =========================
        // CHECK ANSWER
        // =========================
        function checkAnswer(index) {
            const q = questions[currentIndex];
            const result = document.getElementById("result");
            const cards = document.querySelectorAll(".answer-card");
            const nextBtn = document.getElementById("nextBtn");

            cards.forEach(card => card.onclick = null);

            if (index === q.correct) {
                result.innerText = `✅ נכון! התשובה: ${q.answers[q.correct]}`;
                result.style.color = "lightgreen";
                cards[index].classList.add("correct");

                score += 10;
                streak++;
                correctAnswers++;

                if (streak >= 3) {
                    score += 5;
                }

                const rect = cards[index].getBoundingClientRect();
                createParticles(
                    rect.left + rect.width / 2,
                    rect.top + rect.height / 2
                );
            } else {
                result.innerText = `❌ לא נכון! התשובה הנכונה: ${q.answers[q.correct]}`;
                result.style.color = "#ff6b6b";

                cards[index].classList.add("wrong");
                cards[q.correct].classList.add("correct");

                streak = 0;
            }

            updateScore();

            // Remove used question
            questions.splice(currentIndex, 1);

            // Show next button
            nextBtn.style.display = "inline-block";
        }

        // =========================
        // UPDATE SCORE
        // =========================
        function updateScore() {
            document.getElementById("score").innerText = score;
            document.getElementById("streak").innerText = streak;
            document.getElementById("correctCount").innerText = correctAnswers;
        }

        // =========================
        // NEXT ROUND
        // =========================
        function nextRound() {
            document.querySelectorAll(".door").forEach(door => {
                door.classList.remove("open", "disabled");
            });

            document.getElementById("questionBox").style.display = "none";
            locked = false;

            if (questions.length === 0) {
                setTimeout(() => {
                    alert(`🎉 סיימת!\nניקוד סופי: ${score}`);
                }, 300);
                return;
            }

            assignTopicsToDoors();
        }

        // =========================
        // PARTICLES
        // =========================
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        function createParticles(x, y) {
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x,
                    y,
                    size: Math.random() * 6 + 2,
                    speedX: (Math.random() - 0.5) * 6,
                    speedY: (Math.random() - 0.5) * 6,
                    color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                    life: 60
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];

                p.x += p.speedX;
                p.y += p.speedY;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animateParticles);
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // =========================
        // START GAME
        // =========================
        window.addEventListener("load", () => {
            assignTopicsToDoors();
            animateParticles();
        });
    </script>

</body>

</html>
